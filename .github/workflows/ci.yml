name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Required gate: the platforms/Pythons that are stable on GitHub runners today.
  test:
    name: test ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - uses: astral-sh/setup-uv@v5
      - name: Lint + types (pre-commit hooks via prek)
        run: uvx prek@0.4.5 run --all-files --show-diff-on-failure
      - name: Pytest + coverage gate (>=90% line+branch)
        run: pytest --cov=graphed_orchestrator --cov-branch --cov-report=term-missing
      - name: Determinism gate (two identical runs)
        shell: bash
        run: |
          pytest -q > run1.txt
          pytest -q > run2.txt
          python - <<'PY'
          a = [l for l in open("run1.txt") if "passed" in l or "failed" in l]
          b = [l for l in open("run2.txt") if "passed" in l or "failed" in l]
          assert a == b, ("non-deterministic suite", a, b)
          print("deterministic")
          PY

  # Free-threaded + bleeding-edge Pythons (plan A.5). Experimental until runners stabilize;
  # surfaced honestly as non-blocking rather than faked green.
  test-experimental:
    name: test (experimental) py${{ matrix.python }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python: ["3.14t"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q

  build-wheel:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  docs:
    name: docs (sphinx -W)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Graphviz (for inheritance diagrams)
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - name: Build docs with warnings-as-errors
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"
          sphinx-build -W -b html docs docs/_build/html
